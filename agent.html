<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الأداة — دليل وكلاء الذكاء الاصطناعي</title>
    <meta name="description" content="تفاصيل كاملة عن أداة الذكاء الاصطناعي — الميزات والأسعار والتقييم">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8708847484545349" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border: #E2E8F0;
            --border-hover: #CBD5E1;
            --accent: #6366F1;
            --accent-light: #EEF2FF;
            --accent-dark: #4F46E5;
            --green: #10B981;
            --green-light: #ECFDF5;
            --orange: #F59E0B;
            --orange-light: #FFFBEB;
            --red: #EF4444;
            --red-light: #FEF2F2;
            --blue: #3B82F6;
            --blue-light: #EFF6FF;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }

        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        .nav-inner {
            max-width: 1280px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 1.15rem;
        }
        .nav-brand .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), #8B5CF6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; font-weight: 800;
        }
        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-links a {
            padding: 6px 14px; border-radius: var(--radius-sm);
            font-size: 0.88rem; font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .nav-links a:hover { background: #F1F5F9; color: var(--text-primary); }
        .nav-cta {
            background: var(--accent) !important; color: white !important;
            padding: 8px 18px !important; border-radius: var(--radius-sm) !important;
            font-weight: 600 !important; font-size: 0.85rem !important;
        }
        .nav-cta:hover { background: var(--accent-dark) !important; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

        .breadcrumb {
            padding: 20px 0 8px;
            font-size: 0.85rem; color: var(--text-muted);
        }
        .breadcrumb a { color: var(--accent); font-weight: 500; }

        /* AGENT HEADER */
        .agent-header {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin: 16px 0 24px;
        }
        .agent-top {
            display: flex; align-items: flex-start; gap: 20px;
            margin-bottom: 20px;
        }
        .agent-logo {
            width: 72px; height: 72px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
        }
        .agent-logo img { width: 100%; height: 100%; object-fit: contain; }
        .agent-logo .fallback { font-size: 32px; font-weight: 700; color: var(--accent); }
        .agent-info { flex: 1; }
        .agent-name {
            font-size: 1.6rem; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .badge {
            font-size: 0.7rem; padding: 3px 10px; border-radius: 50px; font-weight: 600;
        }
        .badge.os { background: var(--green-light); color: var(--green); }
        .badge.featured { background: var(--accent-light); color: var(--accent); }
        .agent-cat {
            font-size: 0.95rem; color: var(--text-secondary); font-weight: 500;
        }
        .agent-desc {
            font-size: 1.05rem; line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        .agent-actions {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.primary {
            background: var(--accent); color: white; border-color: var(--accent);
        }
        .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

        /* SECTIONS */
        .section {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 1.1rem; font-weight: 700;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }
        .feature-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .feature-item::before {
            content: '✓';
            color: var(--green);
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* PRICING INFO */
        .pricing-card {
            display: flex; align-items: center; gap: 16px;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: var(--radius);
        }
        .pricing-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }
        .pricing-icon.free { background: var(--green-light); }
        .pricing-icon.freemium { background: var(--blue-light); }
        .pricing-icon.paid { background: var(--orange-light); }
        .pricing-icon.enterprise { background: var(--red-light); }
        .pricing-details h4 { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
        .pricing-details p { font-size: 0.88rem; color: var(--text-secondary); }

        /* TAGS */
        .tags-list {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .tag {
            padding: 6px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* RELATED */
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .related-card {
            display: flex; align-items: center; gap: 12px;
            padding: 14px;
            background: var(--bg-primary);
            border-radius: var(--radius);
            transition: all 0.2s;
        }
        .related-card:hover { background: #EEF2FF; }
        .related-logo {
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
            background: white;
            display: flex; align-items: center; justify-content: center;
        }
        .related-logo img { width: 100%; height: 100%; object-fit: contain; }
        .related-name { font-weight: 600; font-size: 0.9rem; }
        .related-desc { font-size: 0.78rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* SPONSOR */
        .sponsor-card {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            border-radius: var(--radius-lg);
            padding: 28px;
            color: white;
            margin-bottom: 16px;
        }
        .sponsor-card h3 { font-size: 1.1rem; margin-bottom: 6px; }
        .sponsor-card p { font-size: 0.9rem; opacity: 0.85; margin-bottom: 14px; }
        .sponsor-card .sponsor-btn {
            display: inline-block;
            padding: 10px 24px;
            background: white;
            color: #4F46E5;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.88rem;
            transition: all 0.2s;
        }
        .sponsor-card .sponsor-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 32px 24px;
            text-align: center;
            margin-top: 40px;
        }
        .footer p { color: var(--text-muted); font-size: 0.88rem; }
        .footer a { color: var(--accent); font-weight: 600; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .agent-top { flex-direction: column; align-items: center; text-align: center; }
            .agent-name { justify-content: center; }
            .agent-actions { justify-content: center; }
            .features-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .agent-header { padding: 20px; }
            .features-grid { grid-template-columns: 1fr; }
        }

        /* LOADING */
        .loading {
            text-align: center; padding: 80px 24px;
            color: var(--text-muted);
        }
        .loading .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-brand">
            <div class="logo-icon">AI</div>
            <span>دليل AI</span>
        </a>
        <div class="nav-links">
            <a href="/">الرئيسية</a>
            <a href="https://app.viktor.com/signin?ref=3XCqvEfwaT2TEAbizz7Bxt" target="_blank" class="nav-cta">جرّب Viktor AI ⚡</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>
    <div id="content" style="display:none;"></div>
</div>

<footer class="footer" id="footer" style="display:none;">
    <p>© 2026 دليل وكلاء الذكاء الاصطناعي — <a href="https://app.viktor.com/signin?ref=3XCqvEfwaT2TEAbizz7Bxt" target="_blank">Viktor AI</a></p>
</footer>

<script>
const CATEGORY_MAP = {
    'general-assistant': { ar: 'مساعد عام', icon: '💬' },
    'coding': { ar: 'برمجة', icon: '💻' },
    'creative': { ar: 'إبداع وتصميم', icon: '🎨' },
    'productivity': { ar: 'إنتاجية', icon: '⚡' },
    'research': { ar: 'بحث وتحليل', icon: '🔬' },
    'no-code': { ar: 'بدون كود', icon: '🧩' },
    'automation': { ar: 'أتمتة', icon: '🔄' },
    'infrastructure': { ar: 'بنية تحتية', icon: '☁️' },
    'framework': { ar: 'أطر عمل', icon: '🏗️' },
    'customer-support': { ar: 'دعم عملاء', icon: '🎧' },
    'sales-marketing': { ar: 'مبيعات وتسويق', icon: '📈' },
    'data-analytics': { ar: 'بيانات وتحليل', icon: '📊' },
    'education': { ar: 'تعليم', icon: '📚' },
    'security': { ar: 'أمن سيبراني', icon: '🛡️' },
    'finance': { ar: 'مالية', icon: '💰' },
    'health': { ar: 'صحة', icon: '🏥' },
    'legal': { ar: 'قانون', icon: '⚖️' },
};

const PRICING_LABELS = {
    'free': { label: 'مجاني', icon: '🆓', desc: 'هذه الأداة متاحة مجاناً بالكامل' },
    'freemium': { label: 'مجاني + مدفوع', icon: '✨', desc: 'باقة مجانية متاحة مع ميزات إضافية مدفوعة' },
    'paid': { label: 'مدفوع', icon: '💎', desc: 'هذه الأداة تتطلب اشتراك مدفوع' },
    'enterprise': { label: 'مؤسسات', icon: '🏢', desc: 'أسعار مخصصة حسب حجم المؤسسة' },
};

async function init() {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = '/'; return; }

    const resp = await fetch('agents.json');
    const agents = await resp.json();
    const agent = agents.find(a => a.id === id);

    if (!agent) {
        document.getElementById('loading').innerHTML = '<h3>الأداة غير موجودة</h3><p><a href="/" style="color:#6366F1">← العودة للرئيسية</a></p>';
        return;
    }

    document.title = `${agent.name_ar} (${agent.name}) — دليل وكلاء AI`;
    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = agent.official_description || agent.description;

    const cat = CATEGORY_MAP[agent.category] || { ar: agent.category_ar, icon: '📦' };
    const pricing = PRICING_LABELS[agent.pricing_type] || PRICING_LABELS.freemium;
    const visitUrl = agent.affiliate_url || agent.url;

    // Related agents (same category)
    const related = agents.filter(a => a.category === agent.category && a.id !== agent.id).slice(0, 6);

    let relatedHTML = '';
    if (related.length > 0) {
        relatedHTML = `
        <div class="section">
            <h3 class="section-title">🔗 أدوات مشابهة</h3>
            <div class="related-grid">
                ${related.map(r => `
                    <a href="agent.html?id=${r.id}" class="related-card">
                        <div class="related-logo">
                            <img src="${r.logo}" alt="${r.name}" onerror="this.parentElement.innerHTML='<span style=font-weight:700;color:#6366F1>${r.name.charAt(0)}</span>'">
                        </div>
                        <div>
                            <div class="related-name">${r.name_ar}</div>
                            <div class="related-desc">${r.description}</div>
                        </div>
                    </a>
                `).join('')}
            </div>
        </div>`;
    }

    const content = document.getElementById('content');
    content.innerHTML = `
        <div class="breadcrumb">
            <a href="/">الرئيسية</a> / <a href="/?cat=${agent.category}">${cat.icon} ${cat.ar}</a> / ${agent.name_ar}
        </div>

        <div class="agent-header">
            <div class="agent-top">
                <div class="agent-logo">
                    <img src="${agent.logo}" alt="${agent.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="fallback" style="display:none">${agent.name.charAt(0)}</div>
                </div>
                <div class="agent-info">
                    <h1 class="agent-name">
                        ${agent.name_ar}
                        <span style="font-weight:400;font-size:0.85rem;color:var(--text-muted)">(${agent.name})</span>
                        ${agent.open_source ? '<span class="badge os">مفتوح المصدر</span>' : ''}
                        ${agent.featured ? '<span class="badge featured">⭐ مميز</span>' : ''}
                    </h1>
                    <div class="agent-cat">${cat.icon} ${cat.ar}${agent.best_for ? ' — ' + agent.best_for : ''}</div>
                </div>
            </div>
            <p class="agent-desc">${agent.official_description || agent.description}</p>
            <div class="agent-actions">
                <a href="${visitUrl}" target="_blank" class="btn primary">زيارة ${agent.name} ←</a>
                <a href="/" class="btn">← العودة للدليل</a>
            </div>
        </div>

        ${agent.features && agent.features.length > 0 ? `
        <div class="section">
            <h3 class="section-title">✨ المميزات</h3>
            <div class="features-grid">
                ${agent.features.map(f => `<div class="feature-item">${f}</div>`).join('')}
            </div>
        </div>` : ''}

        <div class="section">
            <h3 class="section-title">💰 التسعير</h3>
            <div class="pricing-card">
                <div class="pricing-icon ${agent.pricing_type}">${pricing.icon}</div>
                <div class="pricing-details">
                    <h4>${agent.pricing}</h4>
                    <p>${pricing.desc}${agent.has_free_trial ? ' • ' + (agent.free_trial_details || 'تجربة مجانية متاحة') : ''}</p>
                </div>
            </div>
        </div>

        ${agent.tags && agent.tags.length > 0 ? `
        <div class="section">
            <h3 class="section-title">🏷️ الوسوم</h3>
            <div class="tags-list">
                ${agent.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
        </div>` : ''}

        <div class="sponsor-card">
            <h3>🤖 Viktor AI — زميلك الذكي في العمل</h3>
            <p>وكيل AI مستقل يكتب الكود، يبني المواقع، يرسل الإيميلات وينجز المهام 24/7</p>
            <a href="https://app.viktor.com/signin?ref=3XCqvEfwaT2TEAbizz7Bxt" target="_blank" class="sponsor-btn">جرّب Viktor مجاناً ←</a>
        </div>

        ${relatedHTML}
    `;

    document.getElementById('loading').style.display = 'none';
    content.style.display = 'block';
    document.getElementById('footer').style.display = 'block';
}

init();
</script>

</body>
</html>
