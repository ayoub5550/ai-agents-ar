name: Update AI Agents Directory

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Add curated agents
        run: |
          if [ -f scripts/add-final-agents.js ]; then
            node scripts/add-final-agents.js
          fi
      
      - name: Merge expansion files and update index.html
        run: node scripts/setup.js
      
      - name: Discover new AI agents
        run: node scripts/discover-agents.js
      
      - name: Commit changes
        run: |
          git config user.name "AgentVault Bot"
          git config user.email "bot@agentvault.dev"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            AGENT_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('agents.json','utf-8')).length)")
            git commit -m "🤖 Auto-update: ${AGENT_COUNT} AI agents in directory"
            git push
            echo "✅ Committed updates — ${AGENT_COUNT} agents total"
          else
            echo "ℹ️ No changes to commit"
          fi
